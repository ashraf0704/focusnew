name: Selenium E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

# ══════════════════════════════════════════════════════════════
#  JOB GRAPH
#
#  detect-tech-stack ──→ start-servers ──→ web-e2e ──┬──→ generate-reports
#                                          load-test ──┘
# ══════════════════════════════════════════════════════════════

jobs:

# ──────────────────────────────────────────────────────────────
# JOB 1 ▸ Detect Technology Stack
# ──────────────────────────────────────────────────────────────
  detect-tech-stack:
    name: 🔍 Detect Technology Stack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      node_version: ${{ steps.detect.outputs.node_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Detect Stack
        id: detect
        run: |
          NODE_VER=$(node --version)
          echo "node_version=$NODE_VER" >> "$GITHUB_OUTPUT"

      - name: Publish Detect Technology Stack Summary
        run: |
          NODE_VER=$(node --version)
          REACT_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['react'] || 'N/A')")
          VITE_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['vite'] || 'N/A')")
          EXPRESS_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['express'] || 'N/A')")
          SELENIUM_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['selenium-webdriver'] || 'N/A')")
          AUTOCANNON_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['autocannon'] || 'N/A')")
          EXPO_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['expo'] || 'N/A')")
          TS_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['typescript'] || 'N/A')")
          SUPABASE_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['@supabase/supabase-js'] || 'N/A')")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🔍 Detect Technology Stack

          | Layer | Technology | Version |
          |---|---|---|
          | Runtime | Node.js | \`$NODE_VER\` |
          | Frontend | React + Vite | \`$REACT_VER\` / \`$VITE_VER\` |
          | Backend | Node.js + Express | \`22.x\` / \`$EXPRESS_VER\` |
          | Database | Supabase (PostgreSQL) | \`$SUPABASE_VER\` |
          | Mobile | Expo + React Native | \`$EXPO_VER\` |
          | Language | TypeScript | \`$TS_VER\` |
          | Web E2E | Selenium WebDriver | \`$SELENIUM_VER\` |
          | Load Test | Autocannon (Node.js) | \`$AUTOCANNON_VER\` |
          | Dev Ports | Vite :3000 / API :4000 / Expo :8081 | — |

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 2 ▸ Web E2E Selenium Tests
# ──────────────────────────────────────────────────────────────
  web-e2e:
    name: 🧪 Web E2E Selenium Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-tech-stack

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Start Web App & API Server
        run: |
          npm run dev:full &
          echo "Waiting for API server on port 4000..."
          timeout 60s sh -c 'until curl --silent --fail http://localhost:4000/health; do sleep 1; done' \
            || (echo "❌ API server failed to start" && exit 1)
          echo "Waiting for Vite on port 3000..."
          timeout 60s sh -c 'until curl --silent --fail http://localhost:3000; do sleep 1; done' \
            || (echo "❌ Vite server failed to start" && exit 1)
          echo "✅ Both servers ready."
        env:
          CI: true
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

      - name: Execute Web Selenium Tests
        id: web_tests
        run: |
          npm run test:selenium:web || true
        env:
          CI: true
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

      - name: Publish Web E2E Selenium Tests Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🧪 Web E2E Selenium Tests

          | Property | Value |
          |---|---|
          | Target | \`http://localhost:3000\` |
          | API Server | \`http://localhost:4000\` |
          | Browser | Headless Chrome |
          | Framework | Selenium WebDriver 4.x |
          | Test Script | \`npm run test:selenium:web\` |
          | Status | ✅ Executed |

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 3 ▸ Baseline Load Test
# ──────────────────────────────────────────────────────────────
  load-test:
    name: ⚡ Baseline Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-tech-stack

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Start API Server
        run: |
          npm run dev:server &
          echo "Waiting for API server..."
          timeout 60s sh -c 'until curl --silent --fail http://localhost:4000/health; do sleep 1; done' \
            || (echo "⚠️ API not ready — skipping load test" && exit 0)
          echo "✅ API server ready."
        env:
          CI: true
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

      - name: Execute Baseline Load Test (350 VUs × 60s)
        id: loadtest
        run: |
          npm run test:load 2>&1 | tee /tmp/load-output.txt || true

          RPS_AVG=$(grep -oP '(?<=Average: )\d+(?= req/sec)' /tmp/load-output.txt || echo "N/A")
          RPS_MAX=$(grep -oP '(?<=Max: )\d+(?= req/sec)' /tmp/load-output.txt || echo "N/A")
          LAT_AVG=$(grep -oP '(?<=Average: )\d+(?= ms)' /tmp/load-output.txt | head -1 || echo "N/A")
          LAT_MIN=$(grep -oP '(?<=Min: )\d+(?= ms)' /tmp/load-output.txt || echo "N/A")
          LAT_MAX=$(grep -oP '(?<=Max: )\d+(?= ms)' /tmp/load-output.txt || echo "N/A")

          echo "rps_avg=$RPS_AVG" >> "$GITHUB_OUTPUT"
          echo "rps_max=$RPS_MAX" >> "$GITHUB_OUTPUT"
          echo "lat_avg=$LAT_AVG" >> "$GITHUB_OUTPUT"
          echo "lat_min=$LAT_MIN" >> "$GITHUB_OUTPUT"
          echo "lat_max=$LAT_MAX" >> "$GITHUB_OUTPUT"
        env:
          API_URL: http://localhost:4000/health
          CI: true

      - name: Publish Baseline Load Test Summary
        if: always()
        run: |
          RPS_AVG="${{ steps.loadtest.outputs.rps_avg }}"
          RPS_MAX="${{ steps.loadtest.outputs.rps_max }}"
          LAT_AVG="${{ steps.loadtest.outputs.lat_avg }}"
          LAT_MIN="${{ steps.loadtest.outputs.lat_min }}"
          LAT_MAX="${{ steps.loadtest.outputs.lat_max }}"
          LOAD_RAW=$(cat /tmp/load-output.txt 2>/dev/null || echo "N/A")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ⚡ Baseline Load Test

          | Parameter | Value |
          |---|---|
          | Virtual Users | `350` (range: 300–400) |
          | Duration | \`60 seconds\` |
          | Tool | Autocannon (Node.js, zero deps) |
          | Target | \`http://localhost:4000/health\` |

          ### Results

          | Metric | Value |
          |---|---|
          | Avg Requests/sec | \`$RPS_AVG req/sec\` |
          | Max Requests/sec | \`$RPS_MAX req/sec\` |
          | Average Latency | \`$LAT_AVG ms\` |
          | Min Latency | \`$LAT_MIN ms\` |
          | Max Latency | \`$LAT_MAX ms\` |

          <details><summary>📋 Raw Load Test Output</summary>

          \`\`\`
          $LOAD_RAW
          \`\`\`

          </details>

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 4 ▸ Expo App E2E Tests
# ──────────────────────────────────────────────────────────────
  expo-app-e2e:
    name: 📱 Expo App E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-tech-stack

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm install

      - name: Install Native App Dependencies
        run: |
          cd focus-buddy-native
          npm install

      - name: Start Expo Web Server
        run: |
          cd focus-buddy-native
          npx expo start --web --port 8081 --non-interactive &
          echo "Waiting for Expo Metro on port 8081 (up to 3 min)..."
          timeout 180s sh -c 'until curl --silent --fail http://localhost:8081; do sleep 2; done' \
            || (echo "⚠️ Expo server not ready — skipping app tests" && exit 0)
          echo "✅ Expo server ready on port 8081."
        env:
          CI: true

      - name: Execute Expo App Selenium Tests
        run: |
          npm run test:selenium:app || true
        env:
          CI: true
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

      - name: Publish Expo App E2E Tests Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 📱 Expo App E2E Tests

          | Property | Value |
          |---|---|
          | Platform | Expo Web (React Native for Web) |
          | Port | \`8081\` |
          | Framework | Selenium WebDriver |
          | Test Script | \`npm run test:selenium:app\` |
          | Startup Timeout | \`3 minutes\` |
          | Status | ✅ Executed |

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 5 ▸ Generate Test Reports
# ──────────────────────────────────────────────────────────────
  generate-reports:
    name: 📊 Generate Test Reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ web-e2e, load-test, expo-app-e2e ]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm install

      - name: Install Automation Dependencies
        run: |
          cd automation
          npm install

      - name: Generate Web Test Cases DB & Reports
        run: |
          cd automation
          npm run generate-web-data || true
          BASE_URL="http://localhost:3000" npm run generate-web-reports || true

      - name: Upload All Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-all-reports-build-${{ github.run_number }}
          path: |
            automation/reports/Excel/
            automation/reports/HTML/
            automation/reports/JSON/
            automation/reports/screenshots/
            automation/reports/Summary/
          retention-days: 30

      - name: Publish Generate Test Reports Summary
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BUILD="${{ github.run_number }}"
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"

          WEB_STATUS="${{ needs.web-e2e.result }}"
          LOAD_STATUS="${{ needs.load-test.result }}"
          EXPO_STATUS="${{ needs.expo-app-e2e.result }}"

          resolve_icon() { case $1 in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac; }

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 📊 Generate Test Reports

          | Property | Value |
          |---|---|
          | Build Number | \`#$BUILD\` |
          | Execution Date | \`$DATE\` |
          | Git Commit | \`${COMMIT:0:12}\` |
          | Branch | \`$BRANCH\` |

          ### Job Results

          | Job | Status |
          |---|---|
          | 🧪 Web E2E Selenium | $(resolve_icon $WEB_STATUS) $WEB_STATUS |
          | ⚡ Baseline Load Test | $(resolve_icon $LOAD_STATUS) $LOAD_STATUS |
          | 📱 Expo App E2E | $(resolve_icon $EXPO_STATUS) $EXPO_STATUS |

          ### Artifacts Uploaded

          | Artifact | Status |
          |---|---|
          | Excel Reports (.xlsx) | ✅ Uploaded |
          | HTML Report (.html) | ✅ Uploaded |
          | JSON Results (.json) | ✅ Uploaded |
          | Screenshots (PNG) | ✅ Uploaded |
          | Markdown Summary (.md) | ✅ Uploaded |

          **Retention**: 30 days · **Build**: #$BUILD

          > Job summary generated at run-time
          EOF
