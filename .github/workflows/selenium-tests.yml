name: Selenium E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Native App Dependencies
      run: |
        cd focus-buddy-native
        npm install

    - name: Start Web App & API Server and Run Web & Load Tests
      run: |
        npm run dev:full &
        echo "Waiting for API server on port 4000..."
        timeout 60s sh -c 'until curl --silent --fail http://localhost:4000/health; do sleep 1; done' || (echo "API server failed to start" && exit 1)
        echo "Waiting for Vite server on port 3000..."
        timeout 60s sh -c 'until curl --silent --fail http://localhost:3000; do sleep 1; done' || (echo "Vite server failed to start" && exit 1)
        echo "Running Baseline Load Test..."
        npm run test:load
        echo "Running Web E2E Selenium Tests..."
        npm run test:selenium:web
      env:
        CI: true
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}

    - name: Start Expo App and Run App Tests
      run: |
        cd focus-buddy-native
        npx expo start --web --port 8081 --non-interactive &
        echo "Waiting for Expo Metro server on port 8081..."
        timeout 180s sh -c 'until curl --silent --fail http://localhost:8081; do sleep 2; done' || (echo "Expo server failed to start" && exit 1)
        cd ..
        npm run test:selenium:app
      env:
        CI: true
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
