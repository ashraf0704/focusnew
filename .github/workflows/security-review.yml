name: Security Review - DevSecOps Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

# ══════════════════════════════════════════════════════════════
#  JOB GRAPH (matches the screenshot)
#
#  detect-tech-stack ──→  sast             ──→ generate-reports
#                    └──→ dependency-scan  ──┘
#  secret-detection  ────────────────────────┘
# ══════════════════════════════════════════════════════════════

jobs:

# ──────────────────────────────────────────────────────────────
# JOB 1 ▸ Detect Technology Stack   (runs first, no deps)
# ──────────────────────────────────────────────────────────────
  detect-tech-stack:
    name: Detect Technology Stack
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ steps.detect.outputs.framework }}
      node_version: ${{ steps.detect.outputs.node_version }}
      has_express: ${{ steps.detect.outputs.has_express }}
      has_react: ${{ steps.detect.outputs.has_react }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Framework & Stack
        id: detect
        run: |
          FRAMEWORK="unknown"
          HAS_EXPRESS="false"
          HAS_REACT="false"
          NODE_VER=$(node --version 2>/dev/null || echo "N/A")

          if [ -f package.json ]; then
            grep -q '"express"' package.json   && HAS_EXPRESS="true" && FRAMEWORK="node-express"
            grep -q '"react"' package.json     && HAS_REACT="true"
            grep -q '"next"' package.json      && FRAMEWORK="nextjs"
            grep -q '"expo"' package.json      && FRAMEWORK="expo-react-native"
          fi

          echo "framework=$FRAMEWORK"   >> "$GITHUB_OUTPUT"
          echo "node_version=$NODE_VER" >> "$GITHUB_OUTPUT"
          echo "has_express=$HAS_EXPRESS" >> "$GITHUB_OUTPUT"
          echo "has_react=$HAS_REACT"   >> "$GITHUB_OUTPUT"

          echo "Detected: framework=$FRAMEWORK | node=$NODE_VER | express=$HAS_EXPRESS | react=$HAS_REACT"

      - name: Publish Detect Technology Stack Summary
        run: |
          FRAMEWORK="${{ steps.detect.outputs.framework }}"
          NODE_VER="${{ steps.detect.outputs.node_version }}"
          HAS_REACT="${{ steps.detect.outputs.has_react }}"
          HAS_EXPRESS="${{ steps.detect.outputs.has_express }}"

          # Resolve versions from package.json
          REACT_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['react'] || 'N/A')")
          VITE_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['vite'] || 'N/A')")
          EXPRESS_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['express'] || 'N/A')")
          SUPABASE_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['@supabase/supabase-js'] || 'N/A')")
          SELENIUM_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['selenium-webdriver'] || 'N/A')")
          TS_VER=$(node -e "const p=require('./package.json'); console.log(p.devDependencies?.['typescript'] || 'N/A')")
          EXPO_VER=$(node -e "const p=require('./package.json'); console.log(p.dependencies?.['expo'] || 'N/A')")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🔍 Detect Technology Stack

          | Layer | Technology | Version |
          |---|---|---|
          | Runtime | Node.js | \`$NODE_VER\` |
          | Frontend | React + Vite | \`$REACT_VER\` / \`$VITE_VER\` |
          | Backend | Node.js + Express | \`22.x\` / \`$EXPRESS_VER\` |
          | Mobile | Expo + React Native | \`$EXPO_VER\` |
          | Database | Supabase (PostgreSQL) | \`$SUPABASE_VER\` |
          | Auth | Supabase Auth + JWT | — |
          | Language | TypeScript | \`$TS_VER\` |
          | Deployment | GitHub Pages (gh-pages) | — |
          | E2E Tests | Selenium WebDriver | \`$SELENIUM_VER\` |
          | Framework Detected | **$FRAMEWORK** | — |

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 2 ▸ Secret Detection - Gitleaks   (parallel with Job 1)
# ──────────────────────────────────────────────────────────────
  secret-detection:
    name: Secret Detection - Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish Secret Detection Summary
        if: always()
        run: |
          STATUS="${{ steps.gitleaks.outcome }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            RESULT="No secrets detected"
          else
            ICON="⚠️"
            RESULT="Potential secrets found — review Gitleaks output"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🔑 Secret Detection - Gitleaks

          | Property | Value |
          |---|---|
          | Tool | Gitleaks v2 |
          | Scan Mode | Full history (\`fetch-depth: 0\`) |
          | Scope | All branches + commit history |
          | Result | $ICON $RESULT |
          | Status | \`$STATUS\` |

          > Gitleaks scans for hardcoded API keys, tokens, passwords, and secrets in source code and git history.
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 3 ▸ SAST - Semgrep   (needs: detect-tech-stack)
# ──────────────────────────────────────────────────────────────
  sast:
    name: SAST - Semgrep
    needs: detect-tech-stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: TypeScript Type Check (Lint)
        run: npm run lint || true

      - name: Start API Server & Run Smoke Tests
        id: smoke
        run: |
          npm run dev:server &
          SERVER_PID=$!
          echo "Waiting for API server on port 4000..."
          READY=false
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:4000/health > /dev/null 2>&1; then
              READY=true
              break
            fi
            sleep 2
          done

          if [ "$READY" = "true" ]; then
            echo "✅ API server ready."
            HTTP_HEALTH=$(curl --silent --write-out "%{http_code}" --output /dev/null http://localhost:4000/health)
            HTTP_PROFILE=$(curl --silent --write-out "%{http_code}" --output /dev/null http://localhost:4000/api/profile)
            echo "health_status=$HTTP_HEALTH"   >> "$GITHUB_OUTPUT"
            echo "profile_status=$HTTP_PROFILE" >> "$GITHUB_OUTPUT"
            echo "server_ready=true"            >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  API server not ready — skipping smoke tests."
            echo "health_status=N/A"  >> "$GITHUB_OUTPUT"
            echo "profile_status=N/A" >> "$GITHUB_OUTPUT"
            echo "server_ready=false" >> "$GITHUB_OUTPUT"
          fi
          kill $SERVER_PID 2>/dev/null || true
        continue-on-error: true

      - name: Run Semgrep SAST Analysis
        id: semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

      - name: Publish SAST - Semgrep Summary
        if: always()
        run: |
          FRAMEWORK="${{ needs.detect-tech-stack.outputs.framework }}"
          HAS_EXPRESS="${{ needs.detect-tech-stack.outputs.has_express }}"
          SERVER_READY="${{ steps.smoke.outputs.server_ready }}"
          HEALTH_STATUS="${{ steps.smoke.outputs.health_status }}"
          PROFILE_STATUS="${{ steps.smoke.outputs.profile_status }}"
          SEMGREP_STATUS="${{ steps.semgrep.outcome }}"

          [ "$SEMGREP_STATUS" = "success" ] && SEMGREP_ICON="✅" || SEMGREP_ICON="⚠️"
          [ "$SERVER_READY" = "true" ]      && SERVER_ICON="✅" || SERVER_ICON="⚠️"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🛡️ SAST - Semgrep

          | Property | Value |
          |---|---|
          | Detected Framework | \`$FRAMEWORK\` |
          | Has Express Backend | \`$HAS_EXPRESS\` |
          | TypeScript Lint | ✅ Executed |
          | API Server Ready | $SERVER_ICON \`$SERVER_READY\` |
          | /health HTTP | \`$HEALTH_STATUS\` |
          | /api/profile HTTP | \`$PROFILE_STATUS\` (expect 401/403) |
          | Semgrep Analysis | $SEMGREP_ICON \`$SEMGREP_STATUS\` |
          | Rules Applied | \`auto\` (Semgrep registry) |

          > SAST: Static Application Security Testing scans source code for security vulnerabilities, anti-patterns, and misconfigurations without executing the code.
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 4 ▸ Dependency Vulnerability Scan   (needs: detect-tech-stack, parallel with SAST)
# ──────────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    needs: detect-tech-stack
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: vulnerability-reports

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Trivy Filesystem Scan
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0
        continue-on-error: true

      - name: Run npm Audit
        id: npm_audit
        run: |
          mkdir -p "$REPORT_DIR"
          npm audit --json > "$REPORT_DIR/npm-audit.json" 2>/dev/null || true

          # Parse vulnerability counts
          CRITICAL=$(node -e "
            try {
              const j = JSON.parse(require('fs').readFileSync('$REPORT_DIR/npm-audit.json'));
              console.log(j.metadata?.vulnerabilities?.critical || 0);
            } catch(e) { console.log(0); }
          ")
          HIGH=$(node -e "
            try {
              const j = JSON.parse(require('fs').readFileSync('$REPORT_DIR/npm-audit.json'));
              console.log(j.metadata?.vulnerabilities?.high || 0);
            } catch(e) { console.log(0); }
          ")
          MODERATE=$(node -e "
            try {
              const j = JSON.parse(require('fs').readFileSync('$REPORT_DIR/npm-audit.json'));
              console.log(j.metadata?.vulnerabilities?.moderate || 0);
            } catch(e) { console.log(0); }
          ")
          LOW=$(node -e "
            try {
              const j = JSON.parse(require('fs').readFileSync('$REPORT_DIR/npm-audit.json'));
              console.log(j.metadata?.vulnerabilities?.low || 0);
            } catch(e) { console.log(0); }
          ")
          TOTAL_PKGS=$(node -e "
            try {
              const j = JSON.parse(require('fs').readFileSync('$REPORT_DIR/npm-audit.json'));
              console.log(j.metadata?.totalDependencies || 'N/A');
            } catch(e) { console.log('N/A'); }
          ")

          echo "critical=$CRITICAL"     >> "$GITHUB_OUTPUT"
          echo "high=$HIGH"             >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE"     >> "$GITHUB_OUTPUT"
          echo "low=$LOW"               >> "$GITHUB_OUTPUT"
          echo "total_pkgs=$TOTAL_PKGS" >> "$GITHUB_OUTPUT"
          echo "npm_audit_done=true"    >> "$GITHUB_OUTPUT"

      - name: Dependency Review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
        continue-on-error: true

      - name: Upload Dependency Scan Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-reports
          path: |
            trivy-results.txt
            ${{ env.REPORT_DIR }}/npm-audit.json

      - name: Publish Dependency Vulnerability Scan Summary
        if: always()
        run: |
          CRITICAL="${{ steps.npm_audit.outputs.critical }}"
          HIGH="${{ steps.npm_audit.outputs.high }}"
          MODERATE="${{ steps.npm_audit.outputs.moderate }}"
          LOW="${{ steps.npm_audit.outputs.low }}"
          TOTAL_PKGS="${{ steps.npm_audit.outputs.total_pkgs }}"
          TRIVY_STATUS="${{ steps.trivy.outcome }}"

          [ -z "$CRITICAL" ]   && CRITICAL="0"
          [ -z "$HIGH" ]       && HIGH="0"
          [ -z "$MODERATE" ]   && MODERATE="0"
          [ -z "$LOW" ]        && LOW="0"
          [ -z "$TOTAL_PKGS" ] && TOTAL_PKGS="N/A"

          [ "$CRITICAL" = "0" ] && CRIT_ICON="✅" || CRIT_ICON="🚨"
          [ "$HIGH" = "0" ]     && HIGH_ICON="✅" || HIGH_ICON="⚠️"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 📦 Dependency Vulnerability Scan

          | Property | Value |
          |---|---|
          | Total Dependencies Scanned | \`$TOTAL_PKGS\` |
          | Trivy Filesystem Scan | \`$TRIVY_STATUS\` |
          | npm Audit | ✅ Executed |

          ### Vulnerability Summary

          | Severity | Count | Status |
          |---|---|---|
          | 🚨 Critical | \`$CRITICAL\` | $CRIT_ICON |
          | ⚠️ High | \`$HIGH\` | $HIGH_ICON |
          | 🔶 Moderate | \`$MODERATE\` | ℹ️ |
          | 🔵 Low | \`$LOW\` | ℹ️ |

          ### Tools Used

          | Tool | Purpose |
          |---|---|
          | Trivy (aquasecurity) | OS + library CVE scan |
          | npm audit | Node.js dependency audit |
          | Dependency Review | PR diff-based review (PR only) |

          > Job summary generated at run-time
          EOF


# ──────────────────────────────────────────────────────────────
# JOB 5 ▸ Generate Security Reports   (needs: sast + dependency-scan + secret-detection)
# ──────────────────────────────────────────────────────────────
  generate-reports:
    name: Generate Security Reports
    needs: [ sast, dependency-scan, secret-detection ]
    if: always()
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: vulnerability-reports

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Dependency Scan Reports
        uses: actions/download-artifact@v4
        with:
          name: dependency-scan-reports
        continue-on-error: true

      - name: Parse Critical Findings & Gate
        id: gate
        run: |
          CRITICAL=0
          AUDIT_PATH="${{ env.REPORT_DIR }}/npm-audit.json"

          if [ -f "$AUDIT_PATH" ]; then
            CRITICAL=$(node -e "
              try {
                const j = JSON.parse(require('fs').readFileSync('$AUDIT_PATH'));
                console.log(j.metadata?.vulnerabilities?.critical || 0);
              } catch(e) { console.log(0); }
            ")
          fi

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "Critical vulnerabilities found: $CRITICAL"

      - name: Upload Consolidated Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-review-reports
          path: |
            ${{ env.REPORT_DIR }}/
            trivy-results.txt
          if-no-files-found: warn

      - name: Publish Generate Security Reports Summary
        if: always()
        run: |
          CRITICAL="${{ steps.gate.outputs.critical }}"
          [ -z "$CRITICAL" ] && CRITICAL="0"

          SAST_STATUS="${{ needs.sast.result }}"
          DEP_STATUS="${{ needs.dependency-scan.result }}"
          SECRET_STATUS="${{ needs.secret-detection.result }}"

          resolve_icon() {
            case $1 in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          SAST_ICON=$(resolve_icon "$SAST_STATUS")
          DEP_ICON=$(resolve_icon "$DEP_STATUS")
          SECRET_ICON=$(resolve_icon "$SECRET_STATUS")

          [ "$CRITICAL" = "0" ] && GATE_ICON="✅ PASSED" || GATE_ICON="🚨 FAILED ($CRITICAL critical)"
          OVERALL="✅ Security review completed"

          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BUILD="${{ github.run_number }}"
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🛡️ Generate Security Reports

          | Property | Value |
          |---|---|
          | Build Number | \`#$BUILD\` |
          | Execution Date | \`$DATE\` |
          | Git Commit | \`${COMMIT:0:12}\` |
          | Branch | \`$BRANCH\` |

          ### Job Results

          | Job | Status |
          |---|---|
          | 🔍 Detect Technology Stack | ✅ success |
          | 🔑 Secret Detection - Gitleaks | $SECRET_ICON $SECRET_STATUS |
          | 🛡️ SAST - Semgrep | $SAST_ICON $SAST_STATUS |
          | 📦 Dependency Vulnerability Scan | $DEP_ICON $DEP_STATUS |

          ### Security Gate

          | Check | Result |
          |---|---|
          | Critical npm Vulnerabilities | $GATE_ICON |
          | SAST Analysis | $SAST_ICON |
          | Secret Scan | $SECRET_ICON |
          | Dependency Scan | $DEP_ICON |

          ### Artifacts Produced

          | Artifact | Contents |
          |---|---|
          | \`security-review-reports\` | Trivy results + npm audit JSON |
          | \`dependency-scan-reports\` | Raw scan output |

          **Overall:** $OVERALL

          > Job summary generated at run-time
          EOF

      - name: Fail if Critical npm Vulnerabilities Found
        if: steps.gate.outputs.critical != '0'
        run: |
          echo "🚨 SECURITY GATE FAILED: ${{ steps.gate.outputs.critical }} critical npm vulnerabilities detected."
          exit 1
