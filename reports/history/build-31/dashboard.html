
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Buddy - E2E Test Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #FAF9F6; color: #4A4A3A; }
    .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(90,90,64,0.1); }
  </style>
</head>
<body class="p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    <header class="flex justify-between items-center pb-4 border-b border-stone-200">
      <div>
        <h1 class="text-3xl font-extrabold text-stone-800">Test Execution Metrics</h1>
        <p class="text-stone-500 text-sm">Dashboard and Analytical Charts</p>
      </div>
      <div>
        <a href="execution-report.html" class="px-4 py-2 border border-stone-200 rounded-xl text-xs font-bold text-stone-600 hover:bg-stone-50 bg-white transition shadow-xs">View Detailed List</a>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="card p-6 rounded-3xl shadow-xs flex flex-col justify-between">
        <div>
          <h3 class="font-extrabold text-stone-800 text-base mb-4">Summary Totals</h3>
          <ul class="space-y-3 text-sm text-stone-600">
            <li class="flex justify-between"><span>Total Cases:</span><strong class="text-stone-800">510</strong></li>
            <li class="flex justify-between"><span>Passed Count:</span><strong class="text-emerald-600">510</strong></li>
            <li class="flex justify-between"><span>Failed Count:</span><strong class="text-rose-600">0</strong></li>
            <li class="flex justify-between"><span>Skipped Count:</span><strong class="text-amber-500">0</strong></li>
            <li class="flex justify-between"><span>Blocked Count:</span><strong class="text-slate-500">0</strong></li>
          </ul>
        </div>
        <div class="border-t border-stone-100 pt-4 mt-4">
          <div class="flex justify-between items-center text-sm font-bold">
            <span>Overall Success:</span>
            <span class="text-emerald-600">100.00%</span>
          </div>
        </div>
      </div>

      <div class="card p-6 rounded-3xl shadow-xs flex justify-center items-center col-span-2">
        <div class="w-64 h-64">
          <canvas id="metricsChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('metricsChart').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Passed', 'Failed', 'Skipped', 'Blocked'],
        datasets: [{
          data: [510, 0, 0, 0],
          backgroundColor: ['#10B981', '#EF4444', '#F59E0B', '#64748B'],
          borderColor: '#ffffff',
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { family: 'Outfit', size: 12 } }
          }
        }
      }
    });
  </script>
</body>
</html>
