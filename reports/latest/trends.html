
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Buddy - E2E Trends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #FAF9F6; color: #4A4A3A; }
    .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(90,90,64,0.1); }
  </style>
</head>
<body class="p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    <header class="flex justify-between items-center pb-4 border-b border-stone-200">
      <div>
        <h1 class="text-3xl font-extrabold text-stone-800">Historical Trends</h1>
        <p class="text-stone-500 text-sm">Pass Rate Over Time</p>
      </div>
      <div>
        <a href="dashboard.html" class="px-4 py-2 border border-stone-200 rounded-xl text-xs font-bold text-stone-600 hover:bg-stone-50 bg-white transition shadow-xs">View Dashboard</a>
      </div>
    </header>

    <div class="card p-6 rounded-3xl shadow-xs">
      <div class="h-96">
        <canvas id="trendsChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('trendsChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Build #1', 'Build #2', 'Build #3', 'Build #4', 'Build #5 (Latest)'],
        datasets: [{
          label: 'Pass Rate (%)',
          data: [95.0, 95.8, 96.2, 95.9, 100.00],
          borderColor: '#10B981',
          backgroundColor: 'rgba(16, 185, 129, 0.1)',
          fill: true,
          tension: 0.3,
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' }
        },
        scales: {
          y: { min: 80, max: 100 }
        }
      }
    });
  </script>
</body>
</html>
